name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # ── Sync cheatsheets from Gist → content/ ────────────────
      # Runs before the build so Vite glob-imports pick them up.
      # No-ops silently if secrets are not yet configured.
      - name: Sync cheatsheets from Gist
        env:
          VITE_CS_GIST_TOKEN: ${{ secrets.VITE_CS_GIST_TOKEN }}
          VITE_CS_GIST_ID:    ${{ secrets.VITE_CS_GIST_ID }}
        run: |
          if [ -z "$VITE_CS_GIST_TOKEN" ] || [ -z "$VITE_CS_GIST_ID" ]; then
            echo "  ⚠ VITE_CS_GIST_TOKEN or VITE_CS_GIST_ID not set — skipping Gist sync"
            exit 0
          fi

          mkdir -p content

          curl -s \
            -H "Authorization: Bearer $VITE_CS_GIST_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/gists/$VITE_CS_GIST_ID" \
          | python3 - << 'PYEOF'
          import sys, json, os, urllib.request

          data  = json.load(sys.stdin)
          token = os.environ["VITE_CS_GIST_TOKEN"]
          dest  = "content"

          synced = 0
          for name, meta in data.get("files", {}).items():
              if not name.endswith(".md"):
                  continue
              req     = urllib.request.Request(
                  meta["raw_url"],
                  headers={"Authorization": f"Bearer {token}"}
              )
              content = urllib.request.urlopen(req).read()
              path    = os.path.join(dest, name)
              with open(path, "wb") as f:
                  f.write(content)
              print(f"  ✓ synced {name}")
              synced += 1

          print(f"  → {synced} sheet(s) synced from Gist")
          PYEOF

      # ── Build anatomy sub-app ─────────────────────────────────
      - name: Build anatomy app
        run: |
          cd projects/anatomy
          npm install
          npm run build

      # ── Copy anatomy build into main dist ────────────────────
      - name: Copy anatomy build into dist
        run: |
          mkdir -p dist/projects/anatomy
          cp -r projects/anatomy/dist/* dist/projects/anatomy/

      # ── Main site build ───────────────────────────────────────
      - name: Install
        run: npm ci

      - name: Build
        run: |
          npm run build
          touch dist/.nojekyll
          echo williamjwhite.me > dist/CNAME
        env:
          VITE_ADMIN_PIN:       ${{ secrets.VITE_ADMIN_PIN }}
          VITE_GIST_ID:         ${{ secrets.VITE_GIST_ID }}
          VITE_GIST_TOKEN:      ${{ secrets.VITE_GIST_TOKEN }}
          VITE_CS_GIST_TOKEN:   ${{ secrets.VITE_CS_GIST_TOKEN }}
          VITE_CS_GIST_ID:      ${{ secrets.VITE_CS_GIST_ID }}
          VITE_EDITOR_PIN:      ${{ secrets.VITE_EDITOR_PIN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
