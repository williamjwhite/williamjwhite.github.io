# ─────────────────────────────────────────────────────────────────────────────
# PASTE THIS into your .github/workflows/pages.yml
#
# Replace your existing anatomy app build step with the one below.
# Also updates actions/checkout and actions/setup-node to v4 with Node 24
# to silence the deprecation warning.
#
# KEY FIXES:
#   1. working-directory points to projects/anatomy-app (not apps/anatomy-app)
#   2. Copies dist/ output into the main site's build folder so Pages picks it up
#   3. Node 24 + updated action versions
# ─────────────────────────────────────────────────────────────────────────────

# Full updated pages.yml — replace your existing file with this:

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24           # ← fixes the Node 20 deprecation warning
          cache: npm

      # ── Build main site ────────────────────────────────────────────────────
      - name: Install main site deps
        run: npm ci

      - name: Build main site
        run: npm run build

      # ── Build anatomy app ──────────────────────────────────────────────────
      - name: Install anatomy app deps
        working-directory: projects/anatomy-app   # ← was probably apps/anatomy-app
        run: npm ci

      - name: Build anatomy app
        working-directory: projects/anatomy-app
        run: npm run build

      # Copy anatomy app dist into main site output so it's served at /projects/anatomy-app/
      - name: Copy anatomy app build output
        run: cp -r projects/anatomy-app/dist dist/projects/anatomy-app

      # ── Copy plain HTML projects into dist ────────────────────────────────
      # These are static — just copy the folders directly
      - name: Copy static projects
        run: |
          mkdir -p dist/projects
          # Copy projects.json index
          cp projects/projects.json dist/projects/projects.json
          # Copy each static project folder (HTML/CSS/JS apps like EV charging)
          for dir in projects/*/; do
            slug=$(basename "$dir")
            # Skip React apps that already have a dist step above
            if [ "$slug" != "anatomy-app" ]; then
              cp -r "$dir" dist/projects/"$slug"
            fi
          done

      # ── Upload to Pages ────────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
