<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA redirect: store the path and redirect to index.html
      const path = window.location.pathname;
      sessionStorage.setItem("spa-redirect", path);
      window.location.replace("/");
    </script>
  </head>
  <body></body>
</html>
