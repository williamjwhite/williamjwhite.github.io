name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # ── Main site ────────────────────────────────────────────
      - name: Install (main site)
        run: npm ci

      - name: Build (main site)
        run: |
          npm run build
          touch dist/.nojekyll
          echo williamjwhite.me > dist/CNAME
        env:
          VITE_ADMIN_PIN:   ${{ secrets.VITE_ADMIN_PIN }}
          VITE_GIST_ID:     ${{ secrets.VITE_GIST_ID }}
          VITE_GIST_TOKEN:  ${{ secrets.VITE_GIST_TOKEN }}

      # ── Cheatsheets app ──────────────────────────────────────
      - name: Install (cheatsheets)
        working-directory: apps/cheatsheets
        run: npm ci

      - name: Build (cheatsheets)
        working-directory: apps/cheatsheets
        run: npm run build
        # vite.config.js already sets base: '/cheatsheets/'
        # so all assets are correctly prefixed — no env vars needed yet

      - name: Copy cheatsheets into dist
        run: cp -r apps/cheatsheets/dist/. dist/cheatsheets/

      # ── Upload combined dist ─────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4